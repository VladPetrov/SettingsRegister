receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "*"
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  resource/loki:
    attributes:
      - action: upsert
        key: loki.resource.labels
        value: service.name,service.instance.id,container.name

  batch:
    timeout: 5s            # flush interval
    send_batch_size: 8192  # max items per batch

  memory_limiter: { check_interval: 1s, limit_percentage: 80 }

  attributes/scrub:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.response.header.set-cookie
        action: delete

  tail_sampling:
    decision_wait: 5s
    num_traces: 10000
    expected_new_traces_per_sec: 1000
    policies:
      - name: keep-errors
        type: status_code
        status_code: { status_codes: [ ERROR ] }
      - name: keep-slow
        type: latency
        latency: { threshold_ms: 800 }
      - name: keep-debug
        type: string_attribute
        string_attribute:
          key: http.request.header.x-debug-trace
          values: [ "1", "true" ]
      - name: head-sample-default
        type: probabilistic
        probabilistic: { sampling_percentage: 100.0 }

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    compression: gzip

  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls: { insecure: true }
    compression: gzip

  otlp/tempo-grpc:
    endpoint: tempo:4317
    tls:
      insecure: true     # set false if Tempo has TLS
    compression: gzip

  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    resource_to_telemetry_conversion:
      enabled: false

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/loki, attributes/scrub, batch]
      exporters: [otlphttp/loki]
  
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch]
      exporters: [otlp/tempo-grpc]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
