auth_enabled: false

server:
  http_listen_port: 3100

ingester:
  wal:
    dir: /loki/wal
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s           # Time to wait during ingester shutdown for graceful completion
  chunk_idle_period: 30s      # How long to wait before flushing an idle chunk (no new log entries)
  chunk_retain_period: 5m     # How long to retain a closed chunk in memory before dropping it

schema_config:
  configs:
    - from: 2025-01-01 # Use this schema config from this date
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h # Create a new index every 24 hours

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true
  volume_enabled: true

table_manager:
  retention_deletes_enabled: true
  retention_period: 336h

compactor:
  working_directory: /loki/compactor