services:
  loki:
    image: grafana/loki:3.5
    container_name: loki
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    command:
      - "--web.enable-remote-write-receiver"
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--enable-feature=exemplar-storage"
      - "--enable-feature=native-histograms"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    depends_on:
      - otelcol
    volumes:
      - prometheus_data:/prometheus

  memcached:
    image: memcached:1.6.38
    container_name: memcached
    ports:
      - "11211:11211"
    environment:
      MEMCACHED_MAX_MEMORY: 64m
      MEMCACHED_THREADS: "4"

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command:
      - -config.file=/etc/tempo.yaml
    configs:
      - source: tempo_config
        target: /etc/tempo.yaml
    depends_on:
      - memcached
    volumes:
      - tempo_data:/var/tempo

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: otelcol
    restart: always
    ports:
      - "4318:4318"
      - "4317:4317"
      - "9464:9464"
      - "13133:13133"
      - "8889:8889"
    command:
      - "--config=/etc/otelcol.yaml"
    configs:
      - source: otelcol_config
        target: /etc/otelcol.yaml
    depends_on:
      - tempo
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yaml
      - source: grafana_dashboards_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana_dashboard_overview
        target: /etc/grafana/provisioning/dashboards/overview.json
      - source: grafana_dashboard_neo_outbox
        target: /etc/grafana/provisioning/dashboards/Neo-Outbox.json
    depends_on:
      - prometheus
      - tempo
      - loki
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  tempo_data:

configs:
  loki_config:
    content: |
      auth_enabled: false
      
      server:
        http_listen_port: 3100
      
      ingester:
        wal:
          dir: /loki/wal
        lifecycler:
          ring:
            kvstore:
              store: inmemory
            replication_factor: 1
          final_sleep: 0s           # Time to wait during ingester shutdown for graceful completion
        chunk_idle_period: 30s      # How long to wait before flushing an idle chunk (no new log entries)
        chunk_retain_period: 5m     # How long to retain a closed chunk in memory before dropping it
      
      schema_config:
        configs:
          - from: 2025-01-01 # Use this schema config from this date
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h # Create a new index every 24 hours
      
      storage_config:
        tsdb_shipper:
          active_index_directory: /loki/tsdb-index
          cache_location: /loki/tsdb-cache
        filesystem:
          directory: /loki/chunks
      
      limits_config:
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        allow_structured_metadata: true
        volume_enabled: true
      
      table_manager:
        retention_deletes_enabled: true
        retention_period: 336h
      
      compactor:
        working_directory: /loki/compactor
  prometheus_config:
    content: |
      global:
        scrape_interval: 2s        # pull metrics every 2 seconds
        scrape_timeout: 1s         # give each target max 1 second to respond
        evaluation_interval: 10s   # run rules every 10 seconds
      
      scrape_configs:
        - job_name: 'vulcanheadless'
      #    scheme: https
      
      #    metrics_path: /backend_76214/metrics
      
          static_configs:
            - targets: ['prometheus:9090']
      
      
  tempo_config:
    content: |
      stream_over_http_enabled: true
      server:
        http_listen_port: 3200
        log_level: info
      
      cache:
        background:
          writeback_goroutines: 5
        caches:
          - roles:
              - frontend-search
            memcached:
              addresses: dns+memcached:11211
      
      query_frontend:
        mcp_server:
          enabled: true
        search:
          duration_slo: 5s
          throughput_bytes_slo: 1.073741824e+09
          metadata_slo:
            duration_slo: 5s
            throughput_bytes_slo: 1.073741824e+09
        trace_by_id:
          duration_slo: 100ms
        metrics:
          max_duration: 200h # maximum duration of a metrics query, increase for local setups
          query_backend_after: 5m
          duration_slo: 5s
          throughput_bytes_slo: 1.073741824e+09
      
      distributor:
        usage:
          cost_attribution:
            enabled: true
        receivers: # this configuration will listen on all ports and protocols that tempo is capable of.
          otlp:
            protocols:
              grpc:
                endpoint: "tempo:4317"
              http:
                endpoint: "0.0.0.0:4318"
      
      ingester:
        max_block_duration: 5m # cut the headblock when this much time passes. this is being set for demo purposes and should probably be left alone normally
      
      compactor:
        compaction:
          block_retention: 720h # overall Tempo trace retention. set for demo purposes
      
      metrics_generator:
        registry:
          external_labels:
            source: tempo
            cluster: docker-compose
        storage:
          path: /var/tempo/generator/wal
          remote_write:
            - url: http://prometheus:9090/api/v1/write
              send_exemplars: true
        traces_storage:
          path: /var/tempo/generator/traces
        processor:
          local_blocks:
            filter_server_spans: false
            flush_to_storage: true
      
      storage:
        trace:
          backend: local # backend configuration to use
          wal:
            path: /var/tempo/wal # where to store the wal locally
          local:
            path: /var/tempo/blocks
      
      overrides:
        defaults:
          cost_attribution:
            dimensions:
              service.name: "" # unscoped matches both resource and span attributes
              span.http.target: "service_route" # span scoped attribute, also remapped to custom label in metrics.
          metrics_generator:
            processors: [service-graphs, span-metrics, local-blocks] # enables metrics generator
            generate_native_histograms: both
      
  otelcol_config:
    content: |
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
              cors:
                allowed_origins:
                  - "*"
            grpc:
              endpoint: 0.0.0.0:4317
      
      processors:
        resource/loki:
          attributes:
            - action: upsert
              key: loki.resource.labels
              value: service.name,service.instance.id,container.name
      
        batch:
          timeout: 5s            # flush interval
          send_batch_size: 8192  # max items per batch
      
        memory_limiter: { check_interval: 1s, limit_percentage: 80 }
      
        attributes/scrub:
          actions:
            - key: http.request.header.authorization
              action: delete
            - key: http.response.header.set-cookie
              action: delete
      
        tail_sampling:
          decision_wait: 5s
          num_traces: 10000
          expected_new_traces_per_sec: 1000
          policies:
            - name: keep-errors
              type: status_code
              status_code: { status_codes: [ ERROR ] }
            - name: keep-slow
              type: latency
              latency: { threshold_ms: 800 }
            - name: keep-debug
              type: string_attribute
              string_attribute:
                key: http.request.header.x-debug-trace
                values: [ "1", "true" ]
            - name: head-sample-default
              type: probabilistic
              probabilistic: { sampling_percentage: 100.0 }
      
      exporters:
        otlphttp/loki:
          endpoint: http://loki:3100/otlp
          compression: gzip
      
        otlphttp/tempo:
          endpoint: http://tempo:4318
          tls: { insecure: true }
          compression: gzip
      
        otlp/tempo-grpc:
          endpoint: tempo:4317
          tls:
            insecure: true     # set false if Tempo has TLS
          compression: gzip
      
        prometheusremotewrite:
          endpoint: "http://prometheus:9090/api/v1/write"
          resource_to_telemetry_conversion:
            enabled: false
      
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
      
      service:
        extensions: [health_check]
        pipelines:
          logs:
            receivers: [otlp]
            processors: [memory_limiter, resource/loki, attributes/scrub, batch]
            exporters: [otlphttp/loki]
        
          traces:
            receivers: [otlp]
            processors: [memory_limiter, tail_sampling, batch]
            exporters: [otlp/tempo-grpc]
      
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [prometheusremotewrite]
      
  grafana_datasources:
    content: |
      apiVersion: 1
      
      datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        orgId: 1
        url: http://prometheus:9090
        basicAuth: false
        isDefault: false
        version: 1
        editable: false
        jsonData:
          httpMethod: GET
      
      - name: Tempo
        type: tempo
        access: proxy
        orgId: 1
        url: http://tempo:3200
        basicAuth: false
        isDefault: true
        version: 1
        editable: false
        apiVersion: 1
        uid: tempo
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          streamingEnabled:
            search: true
      
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
